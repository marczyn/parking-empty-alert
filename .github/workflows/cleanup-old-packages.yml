name: Cleanup old package versions

on:
  workflow_dispatch:
    inputs:
      keep:
        description: 'Number of latest versions to keep per package'
        required: true
        default: '2'
  workflow_run:
    workflows: ["Build and push all-in-one Docker images"]
    types: [completed]

permissions:
  packages: write

jobs:
  cleanup-full:
    # Only clean up after a SUCCESSFUL build (or a manual dispatch) — don't prune
    # packages following a failed/cancelled build run.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    # API-only (delete-package-versions) — run on an ephemeral GitHub-hosted runner, not
    # the persistent self-hosted build host, to isolate this destructive packages:write
    # step and decouple GC from that runner's availability.
    runs-on: ubuntu-latest
    steps:
      - name: Delete untagged parking-empty-alert versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: 'parking-empty-alert'
          package-type: 'container'
          # Default matches the workflow_dispatch input default ('2') on both paths.
          min-versions-to-keep: ${{ github.event.inputs.keep || '2' }}
          delete-only-untagged-versions: 'true'

  cleanup-lite:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    # API-only (delete-package-versions) — run on an ephemeral GitHub-hosted runner, not
    # the persistent self-hosted build host, to isolate this destructive packages:write
    # step and decouple GC from that runner's availability.
    runs-on: ubuntu-latest
    steps:
      - name: Delete untagged parking-empty-alert-lite versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: 'parking-empty-alert-lite'
          package-type: 'container'
          min-versions-to-keep: ${{ github.event.inputs.keep || '2' }}
          delete-only-untagged-versions: 'true'
