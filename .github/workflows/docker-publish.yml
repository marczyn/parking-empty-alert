name: Build and push all-in-one Docker images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for both images'
        required: true
        default: 'latest'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-full:
    name: Build all-in-one (Frigate + Mosquitto + HA)
    runs-on: [self-hosted, linux, x64, parking]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AIO full image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aio-full
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/parking-empty-alert:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/parking-empty-alert:${{ github.event.inputs.tag || github.event.release.tag_name }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=aio-full
          cache-to: type=gha,scope=aio-full,mode=max

  build-lite:
    name: Build all-in-one lite (Frigate + Mosquitto)
    runs-on: [self-hosted, linux, x64, parking]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AIO lite image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.aio-lite
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/parking-empty-alert-lite:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/parking-empty-alert-lite:${{ github.event.inputs.tag || github.event.release.tag_name }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=aio-lite
          cache-to: type=gha,scope=aio-lite,mode=max
