name: Purge old package versions (one-off)

# One-off manual cleanup: delete historical GHCR versions, keeping ONLY the v1.2.0
# release set. A version is KEPT if it carries a keep tag (v1.2.0 / latest /
# v1.2.0-amd64 / v1.2.0-arm64 / amd64 / arm64 — the bare arch tags alias the v1.2.0
# children) OR its digest is referenced by the v1.2.0 manifest index (children /
# attestations). Everything else (v1.0.2, v1.1.0*, untagged orphans) is deleted.
# Guarded by a typed confirmation so it can't fire by accident.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "purge" to confirm irreversible deletion'
        required: true
        default: ''

permissions:
  packages: write

jobs:
  purge:
    if: github.event.inputs.confirm == 'purge'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [parking-empty-alert, parking-empty-alert-lite]
    steps:
      - name: Delete old versions, keep the v1.2.0 set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PKG: ${{ matrix.package }}
        run: |
          set -euo pipefail
          KEEP_TAGS="v1.2.0 latest v1.2.0-amd64 v1.2.0-arm64 amd64 arm64"

          # Digests the v1.2.0 index references (children + any attestation manifests),
          # plus the index's own digest — kept even if some are untagged.
          TOK=$(curl -s "https://ghcr.io/token?scope=repository:${OWNER}/${PKG}:pull" | jq -r .token)
          ACCEPT='-H Accept:application/vnd.oci.image.index.v1+json -H Accept:application/vnd.docker.distribution.manifest.list.v2+json'
          KEEP_DIGESTS=$(curl -s -H "Authorization: Bearer $TOK" $ACCEPT \
            "https://ghcr.io/v2/${OWNER}/${PKG}/manifests/v1.2.0" | jq -r '.manifests[].digest' || true)
          LIST_DIGEST=$(curl -sI -H "Authorization: Bearer $TOK" $ACCEPT \
            "https://ghcr.io/v2/${OWNER}/${PKG}/manifests/v1.2.0" \
            | tr -d '\r' | awk 'tolower($1)=="docker-content-digest:"{print $2}')
          KEEP_DIGESTS="$KEEP_DIGESTS $LIST_DIGEST"
          echo "::notice::[$PKG] keep digests: $KEEP_DIGESTS"

          gh api --paginate "/users/${OWNER}/packages/container/${PKG}/versions" > versions.json
          echo "[$PKG] total versions: $(jq length versions.json)"

          jq -c '.[]' versions.json | while read -r v; do
            id=$(echo "$v" | jq -r '.id')
            name=$(echo "$v" | jq -r '.name')
            tags=$(echo "$v" | jq -r '.metadata.container.tags[]?' | tr '\n' ' ')
            keep=no
            for t in $tags;        do for k in $KEEP_TAGS;    do [ "$t" = "$k" ] && keep=yes; done; done
            for d in $KEEP_DIGESTS; do [ "$name" = "$d" ] && keep=yes; done
            if [ "$keep" = yes ]; then
              echo "KEEP   id=$id  $name  tags=[$tags]"
            else
              echo "DELETE id=$id  $name  tags=[$tags]"
              gh api --method DELETE "/users/${OWNER}/packages/container/${PKG}/versions/${id}"
            fi
          done
          echo "[$PKG] done."
