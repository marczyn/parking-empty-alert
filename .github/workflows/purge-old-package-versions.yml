name: Purge old package versions (one-off)

# One-off: enumerate EVERY GHCR version (tagged + untagged) for both packages and
# delete anything that is not part of the v1.2.0 release. A version is KEPT iff it
# carries a keep tag (v1.2.0 / latest / v1.2.0-amd64 / v1.2.0-arm64 / amd64 / arm64)
# OR its digest is referenced by the v1.2.0 index (children) OR is an OCI referrer
# (attestation/SBOM) of a kept v1.2.0 digest. Logs the full version inventory first
# so the run output is authoritative proof of what remains.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "purge" to confirm irreversible deletion'
        required: true
        default: ''

permissions:
  packages: write

jobs:
  purge:
    if: github.event.inputs.confirm == 'purge'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [parking-empty-alert, parking-empty-alert-lite]
    steps:
      - name: Inventory + purge non-v1.2.0 versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PKG: ${{ matrix.package }}
        run: |
          set -euo pipefail
          KEEP_TAGS="v1.2.0 latest v1.2.0-amd64 v1.2.0-arm64 amd64 arm64"
          TOK=$(curl -s "https://ghcr.io/token?scope=repository:${OWNER}/${PKG}:pull" | jq -r .token)
          AH='-H Accept:application/vnd.oci.image.index.v1+json -H Accept:application/vnd.docker.distribution.manifest.list.v2+json -H Accept:application/vnd.oci.image.manifest.v1+json -H Accept:application/vnd.docker.distribution.manifest.v2+json'

          # Build keep-digest set: v1.2.0 index digest + its children + referrers of each.
          keep_d() { printf '%s\n' "$@"; }
          LIST_DIGEST=$(curl -sI -H "Authorization: Bearer $TOK" $AH "https://ghcr.io/v2/${OWNER}/${PKG}/manifests/v1.2.0" | tr -d '\r' | awk 'tolower($1)=="docker-content-digest:"{print $2}')
          CHILDREN=$(curl -s -H "Authorization: Bearer $TOK" $AH "https://ghcr.io/v2/${OWNER}/${PKG}/manifests/v1.2.0" | jq -r '.manifests[].digest' || true)
          KEEP_DIGESTS="$LIST_DIGEST $CHILDREN"
          for d in $LIST_DIGEST $CHILDREN; do
            refs=$(curl -s -H "Authorization: Bearer $TOK" $AH "https://ghcr.io/v2/${OWNER}/${PKG}/referrers/${d}" | jq -r '.manifests[]?.digest' 2>/dev/null || true)
            KEEP_DIGESTS="$KEEP_DIGESTS $refs"
          done
          echo "::group::[$PKG] keep digests"; printf '%s\n' $KEEP_DIGESTS; echo "::endgroup::"

          gh api --paginate "/users/${OWNER}/packages/container/${PKG}/versions" > v.json
          echo "[$PKG] FULL INVENTORY ($(jq length v.json) versions):"
          jq -r '.[] | "  id=\(.id) created=\(.created_at) digest=\(.name[0:19]) tags=[\(.metadata.container.tags|join(","))]"' v.json

          echo "[$PKG] --- decisions ---"
          jq -c '.[]' v.json | while read -r v; do
            id=$(echo "$v" | jq -r '.id'); name=$(echo "$v" | jq -r '.name')
            tags=$(echo "$v" | jq -r '.metadata.container.tags[]?' | tr '\n' ' ')
            keep=no
            for t in $tags;        do for k in $KEEP_TAGS; do [ "$t" = "$k" ] && keep=yes; done; done
            for d in $KEEP_DIGESTS; do [ "$name" = "$d" ] && keep=yes; done
            if [ "$keep" = yes ]; then echo "  KEEP   id=$id ${name:0:19} [$tags]"
            else echo "  DELETE id=$id ${name:0:19} [$tags]"; gh api --method DELETE "/users/${OWNER}/packages/container/${PKG}/versions/${id}"; fi
          done
          echo "[$PKG] done — remaining: $(gh api --paginate "/users/${OWNER}/packages/container/${PKG}/versions" | jq length)"
