###############################################################################
# Mosquitto MQTT broker configuration
###############################################################################

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence — saves retained MQTT messages + subscriptions across restarts.
# Risk: container crash mid-write can corrupt mosquitto.db → restart loop.
# Mitigation: autosave_interval controls flush frequency. Lower = safer but more I/O.
persistence true
persistence_location /mosquitto/data/
autosave_interval 60        # flush state to disk every 60s (default = 1800s)
autosave_on_changes false   # autosave by timer, not per-change (reduces I/O bursts)

# Log to stdout only — Docker captures stdout with built-in rotation
# (json-file driver: max-size=10m max-file=3 by default at host level).
# Avoid writing log files inside the container — they have no rotation
# and would fill the persistent volume over time.
log_dest stdout
log_type error
log_type warning
log_type notice
# Uncomment for debug only — generates a lot of output:
# log_type information
# log_type debug

# Reasonable connection limits — cap at 100 for safety
# Default Frigate + HA + diagnostic clients = ~5 connections
max_connections 100
max_keepalive 65535
