###############################################################################
# Mosquitto MQTT broker configuration
###############################################################################

listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

# Log to stdout only — Docker captures stdout with built-in rotation
# (json-file driver: max-size=10m max-file=3 by default at host level).
# Avoid writing log files inside the container — they have no rotation
# and would fill the persistent volume over time.
log_dest stdout
log_type error
log_type warning
log_type notice
# Uncomment for debug only — generates a lot of output:
# log_type information
# log_type debug

# Reasonable connection limits
max_connections -1
max_keepalive 65535
