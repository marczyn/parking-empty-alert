###############################################################################
# AUTOMATION: 🅿️ Parking spot EMPTY → WhatsApp
#
# Triggers when:
#   - Frigate reports 0 cars in zone "parking_spot"
#   - State persists for 2 minutes (anti-blink filter — driver passing through)
#
# Action:
#   - WhatsApp message via CallMeBot
###############################################################################
- id: parking_spot_free_alert
  alias: "🅿️ Parking spot empty → WhatsApp"
  description: "WhatsApp alert when spot has been empty for 2 min"
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.parking_parking_spot_car
      below: 1
      for:
        minutes: 2
  action:
    - service: notify.whatsapp_parking
      data:
        message: >
          🅿️ Parking spot FREE!
          You can park — became free 2 min ago.
          Time: {{ now().strftime('%H:%M') }}

