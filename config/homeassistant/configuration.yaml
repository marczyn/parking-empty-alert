###############################################################################
# Home Assistant — minimal config for parking detection
# Frigate will automatically appear as an integration after HA starts
###############################################################################

default_config:

# ─────────────────────────────────────────────────────────────
# HTTP / reverse proxy support
# Uncomment and edit if HA is behind a reverse proxy (NPM, Traefik, SWAG, etc.).
# Without this, HA rejects requests with 'WrongHostError'.
# ─────────────────────────────────────────────────────────────
# http:
#   use_x_forwarded_for: true
#   trusted_proxies:
#     - 172.16.0.0/12          # Docker bridge networks
#     - 192.168.0.0/16         # LAN — narrow this to your reverse proxy IP
#     - 10.0.0.0/8             # private network
#   # If exposed to internet, also set:
#   # ip_ban_enabled: true
#   # login_attempts_threshold: 5

mqtt:
  broker: mosquitto
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_password

# ─────────────────────────────────────────────────────────────
# WhatsApp via CallMeBot — free service, zero registration
# Setup (5 min — see README, section "Step 2 — WhatsApp APIKEY"):
#   1. Add +34 644 11 11 11 to phone contacts
#   2. Send WhatsApp message: "I allow callmebot to send me messages"
#   3. Response: "API Activated for your phone number. Your APIKEY is XXXXX"
#   4. Put phone number + apikey in secrets.yaml (or via setup.sh)
#
# CallMeBot rate limit: 1 message per minute per phone number.
#
# notify.rest with method: GET sends all `data` fields as query parameters,
# plus the message via `message_param_name`. Result URL:
#   GET https://api.callmebot.com/whatsapp.php?phone=X&apikey=Y&text=Z
# ─────────────────────────────────────────────────────────────
notify:
  - name: whatsapp_parking
    platform: rest
    resource: "https://api.callmebot.com/whatsapp.php"
    method: GET
    message_param_name: text
    data:
      phone: !secret whatsapp_phone
      apikey: !secret whatsapp_apikey
    verify_ssl: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

logger:
  default: info
