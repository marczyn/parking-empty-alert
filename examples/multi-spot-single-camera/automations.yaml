###############################################################################
# WATCHDOG: Frigate offline
###############################################################################
- id: frigate_offline_watchdog
  alias: "⚠️ Frigate offline watchdog"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.parking_lot_motion
      to: "unavailable"
      for: {minutes: 10}
  action:
    - service: notify.whatsapp_parking
      data:
        message: >
          ⚠️ Frigate offline >10 min! AI detection stopped.
          Time: {{ now().strftime('%Y-%m-%d %H:%M') }}

- id: frigate_recovered_watchdog
  alias: "✅ Frigate recovered"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.parking_lot_motion
      from: "unavailable"
      for: {minutes: 1}
  action:
    - service: notify.whatsapp_parking
      data:
        message: >
          ✅ Frigate back online.
          Time: {{ now().strftime('%Y-%m-%d %H:%M') }}
