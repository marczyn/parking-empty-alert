###############################################################################
# SUMMARY: alert when overall occupancy changes
# Sends 1 WhatsApp showing all 5 spots' status at once.
###############################################################################
- id: parking_summary_change
  alias: "📊 Parking summary on occupancy change"
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.parking_free_count
      for: {minutes: 1}
  action:
    - service: notify.whatsapp_parking
      data:
        message: >
          📊 Parking: {{ states('sensor.parking_free_count') }}/5 free
          {% for n in range(1, 6) -%}
          Spot {{n}}: {{ "✅" if states('sensor.parking_lot_spot_' ~ n ~ '_car') == '0' else "🚗" }}
          {% endfor -%}
          Time: {{ now().strftime('%H:%M') }}

