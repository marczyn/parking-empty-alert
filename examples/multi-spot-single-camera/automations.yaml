###############################################################################
# Multi-spot single-camera automations
# 5 per-spot alerts + 1 summary alert + Frigate watchdog
###############################################################################

# ─── PARKING SPOT 1 → free ───
- id: parking_spot_1_free
  alias: "🅿️ Spot 1 → free"
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.parking_lot_spot_1_car
      below: 1
      for: {minutes: 2}
  action:
    - service: notify.whatsapp_parking
      data:
        message: "🅿️ Spot 1 FREE. Time: {{ now().strftime('%H:%M') }}"

