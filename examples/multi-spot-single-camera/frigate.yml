###############################################################################
# Frigate config — 1 camera, N parking spots (wide-angle setup)
# Copy TO config/frigate.yml when using one wide-angle camera for 5+ spots
###############################################################################

mqtt:
  enabled: true
  host: mosquitto
  port: 1883
  user: "{FRIGATE_MQTT_USER}"
  password: "{FRIGATE_MQTT_PASSWORD}"
  topic_prefix: frigate
  client_id: frigate

detectors:
  cpu1:
    type: cpu
    num_threads: 4   # bump from 3 — wide-angle frames have more pixels to process

model:
  path: /config/model_cache/yolov8n_320x320.onnx
  input_tensor: nchw
  input_pixel_format: rgb
  input_dtype: float
  width: 320
  height: 320
  labelmap_path: /labelmap/coco-80.txt

ffmpeg:

detect:
  enabled: true
  fps: 5
  max_disappeared: 25
  stationary:
    interval: 50
    threshold: 50
    max_frames:
      default: 0

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 7

record:
  enabled: true
  retain:
    days: 3
    mode: motion
  events:
    retain:
      default: 7
      mode: active_objects

###############################################################################
# CAMERA: parking_lot — single wide-angle camera with 5 zones
###############################################################################
cameras:
  parking_lot:
    enabled: true

    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@CAMERA_IP_PLACEHOLDER:554/h264Preview_01_sub
          roles: [detect]
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@CAMERA_IP_PLACEHOLDER:554/h264Preview_01_main
          roles: [record]

    # For wide-angle, use higher detect resolution (640×360 may not capture distant cars)
    detect:
      width: 1280
      height: 720
      fps: 5

    objects:
      track:
        - car
        - truck
        - motorcycle
      filters:
        car:
          min_area: 800            # smaller cars at distance
          max_area: 500000
          min_score: 0.45          # slightly lower threshold
          threshold: 0.6
        truck:
          min_score: 0.45
          threshold: 0.6

    ###############################################################################
    # ZONES — draw each in Frigate UI Edit Zones, paste coordinates here
    # Example layout: 5 parking spots in a row, viewed from the front
    ###############################################################################
    zones:
      spot_1:
        coordinates: 0.05,0.40,0.20,0.40,0.20,0.85,0.05,0.85   # PLACEHOLDER leftmost
        inertia: 3
        loitering_time: 0
        objects: [car, truck, motorcycle]

      spot_2:
        coordinates: 0.20,0.40,0.35,0.40,0.35,0.85,0.20,0.85   # PLACEHOLDER 2nd
        inertia: 3
        loitering_time: 0
        objects: [car, truck, motorcycle]

      spot_3:
        coordinates: 0.35,0.40,0.50,0.40,0.50,0.85,0.35,0.85   # PLACEHOLDER middle
        inertia: 3
        loitering_time: 0
        objects: [car, truck, motorcycle]

      spot_4:
        coordinates: 0.50,0.40,0.65,0.40,0.65,0.85,0.50,0.85   # PLACEHOLDER 4th
        inertia: 3
        loitering_time: 0
        objects: [car, truck, motorcycle]

      spot_5:
        coordinates: 0.65,0.40,0.80,0.40,0.80,0.85,0.65,0.85   # PLACEHOLDER rightmost
        inertia: 3
        loitering_time: 0
        objects: [car, truck, motorcycle]

    motion:
      mask:
        # Optional: mask out parts where no parking spot exists (sidewalk, street)
        []

    snapshots:
      enabled: true
      retain:
        default: 7

    record:
      enabled: true
      retain:
        days: 3
      events:
        retain:
          default: 7

