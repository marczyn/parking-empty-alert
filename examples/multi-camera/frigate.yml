###############################################################################
# EXAMPLE: Multi-camera Frigate config
# Copy TO config/frigate.yml if you have more than 1 parking spot
# (e.g., 3 office spots, family parking, garage + street, etc.)
#
# Each camera has its OWN zone, OWN entities in HA, OWN automations
###############################################################################

mqtt:
  enabled: true
  host: mosquitto
  port: 1883
  user: "{FRIGATE_MQTT_USER}"
  password: "{FRIGATE_MQTT_PASSWORD}"
  topic_prefix: frigate
  # client_id substituted to unique '<hostname>' by setup.sh
  client_id: frigate

detectors:
  cpu1:
    type: cpu
    num_threads: 3
  # For >3 cameras a Coral USB TPU is recommended:
  # coral1:
  #   type: edgetpu
  #   device: usb

ffmpeg:

detect:
  enabled: true
  fps: 5
  stationary:
    interval: 50
    threshold: 50
    max_frames:
      default: 0       # 0 = persistent forever — critical for parking

snapshots:
  enabled: true
  retain: {default: 7}

record:
  enabled: true
  retain: {days: 3, mode: motion}

###############################################################################
# CAMERAS — duplicate the section for each parking spot
###############################################################################
cameras:

  # ─── CAMERA 1: office parking spot #1 ───
  parking_a:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.101:554/h264Preview_01_sub
          roles: [detect]
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.101:554/h264Preview_01_main
          roles: [record]
    detect: {width: 640, height: 360, fps: 5}
    objects:
      track: [car, truck]
      filters:
        car: {min_score: 0.5, threshold: 0.7}
    zones:
      spot_a:
        coordinates: 0.30,0.45,0.55,0.45,0.55,0.85,0.30,0.85
        inertia: 3
        objects: [car, truck]

  # ─── CAMERA 2: office parking spot #2 ───
  parking_b:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.102:554/h264Preview_01_sub
          roles: [detect]
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.102:554/h264Preview_01_main
          roles: [record]
    detect: {width: 640, height: 360, fps: 5}
    objects:
      track: [car, truck]
    zones:
      spot_b:
        coordinates: 0.30,0.45,0.55,0.45,0.55,0.85,0.30,0.85
        objects: [car, truck]

  # ─── CAMERA 3: home garage ───
  garage:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.103:554/h264Preview_01_sub
          roles: [detect]
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@192.168.1.103:554/h264Preview_01_main
          roles: [record]
    detect: {width: 640, height: 360, fps: 5}
    objects:
      track: [car, truck, motorcycle]
    zones:
      garage_spot:
        coordinates: 0.20,0.30,0.80,0.30,0.80,0.90,0.20,0.90
        objects: [car, truck, motorcycle]

