###############################################################################
# Multi-camera automations — alert per zone
###############################################################################

# ─── PARKING A: spot #1 ───
- id: parking_a_free
  alias: "🅿️ Spot A → free"
  trigger:
    - platform: numeric_state
      entity_id: sensor.parking_a_spot_a_car
      below: 1
      for: {minutes: 2}
  condition:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['unknown', 'unavailable', 'none']
           and (trigger.from_state.state | int(0)) >= 1 }}
  action:
    - service: notify.whatsapp_parking
      data:
        message: "🅿️ Spot A FREE. Time: {{ now().strftime('%H:%M') }}"

