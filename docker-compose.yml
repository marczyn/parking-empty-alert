###############################################################################
# Parking Empty Alert — Frigate + MQTT + Home Assistant
# Universal stack — works on any Docker host (Linux/Windows/macOS)
# Hardware: no special requirements (CPU only, optional Coral USB)
#
# Quick start:
#   1. Copy .env.example -> .env and fill in passwords + camera IP
#   2. docker compose up -d
#   3. Open Frigate UI:  http://<host>:5000
#   4. Open HA UI:        http://<host>:8123
###############################################################################

services:

  # ─────────────────────────────────────────────────────────────
  # MQTT broker — communication Frigate ↔ Home Assistant
  # ─────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  # ─────────────────────────────────────────────────────────────
  # Frigate — NVR + AI object detection
  # ─────────────────────────────────────────────────────────────
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: always
    depends_on:
      - mosquitto
    shm_size: 256mb          # increase to 512mb if >1 camera
    # Uncomment if you have Coral USB TPU:
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb
    # Uncomment if you have NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    environment:
      FRIGATE_RTSP_USER: "${RTSP_USER}"
      FRIGATE_RTSP_PASSWORD: "${RTSP_PASSWORD}"
      FRIGATE_MQTT_USER: "${MQTT_USER}"
      FRIGATE_MQTT_PASSWORD: "${MQTT_PASSWORD}"
    volumes:
      - ./config/frigate.yml:/config/config.yml:ro
      - frigate-storage:/media/frigate
      - /etc/localtime:/etc/localtime:ro
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000   # 1GB cache in RAM
    ports:
      - "5000:5000"          # Frigate UI
      - "8554:8554"          # RTSP restream (optional)
      - "8555:8555/tcp"      # WebRTC TCP
      - "8555:8555/udp"      # WebRTC UDP

  # ─────────────────────────────────────────────────────────────
  # Home Assistant — automations + push notifications
  # ─────────────────────────────────────────────────────────────
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: always
    depends_on:
      - mosquitto
      - frigate
    network_mode: host         # needed for discovery + Companion App
    privileged: true
    environment:
      TZ: "Europe/Warsaw"
    volumes:
      - ./config/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro

volumes:
  mosquitto-data:
  mosquitto-log:
  frigate-storage:
