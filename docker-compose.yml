###############################################################################
# Parking Empty Alert — Frigate + MQTT + Home Assistant
# Universal stack — działa na każdym hoście z Dockerem (Linux/Windows/macOS)
# Hardware: brak wymagań specjalnych (CPU only, optional Coral USB)
#
# Quick start:
#   1. Skopiuj .env.example -> .env i wpisz hasła + IP kamery
#   2. docker compose up -d
#   3. Otwórz Frigate UI:  http://<host>:5000
#   4. Otwórz HA UI:        http://<host>:8123
###############################################################################

services:

  # ─────────────────────────────────────────────────────────────
  # MQTT broker — komunikacja Frigate ↔ Home Assistant
  # ─────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  # ─────────────────────────────────────────────────────────────
  # Frigate — NVR + AI object detection
  # ─────────────────────────────────────────────────────────────
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: frigate
    restart: always
    depends_on:
      - mosquitto
    shm_size: 256mb          # zwiększ do 512mb jeśli >1 kamera
    # Odkomentuj jeśli masz Coral USB TPU:
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb
    # Odkomentuj jeśli masz NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    environment:
      FRIGATE_RTSP_USER: "${RTSP_USER}"
      FRIGATE_RTSP_PASSWORD: "${RTSP_PASSWORD}"
      FRIGATE_MQTT_USER: "${MQTT_USER}"
      FRIGATE_MQTT_PASSWORD: "${MQTT_PASSWORD}"
    volumes:
      - ./config/frigate.yml:/config/config.yml:ro
      - frigate-storage:/media/frigate
      - /etc/localtime:/etc/localtime:ro
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000   # 1GB cache w RAM
    ports:
      - "5000:5000"          # Frigate UI
      - "8554:8554"          # RTSP restream (opcjonalnie)
      - "8555:8555/tcp"      # WebRTC TCP
      - "8555:8555/udp"      # WebRTC UDP

  # ─────────────────────────────────────────────────────────────
  # Home Assistant — automations + push notifications
  # ─────────────────────────────────────────────────────────────
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: always
    depends_on:
      - mosquitto
      - frigate
    network_mode: host         # potrzebne dla discovery + Companion App
    privileged: true
    environment:
      TZ: "Europe/Warsaw"
    volumes:
      - ./config/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro

volumes:
  mosquitto-data:
  mosquitto-log:
  frigate-storage:
